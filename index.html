<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#C8553D"/>
  <title>Atithi · Booking engine</title>

  <!-- PWA install-to-home-screen wiring. Manifest declares the app to
       Chrome / Android / iOS so 'Add to Home Screen' creates a real
       app launcher. The service worker (registered at the bottom of
       this page) caches the app shell so repeat opens are instant. -->
  <link rel="manifest" href="manifest.webmanifest"/>
  <link rel="apple-touch-icon" href="icons/icon-192.svg"/>
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Atithi"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      height: 100%;
      background: #1a1512;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    /* Mobile (default) — app fills the viewport edge-to-edge with no
       frame. Width caps at 430px so the layout doesn't stretch on
       larger phones. */
    #root {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      position: relative;
      overflow: hidden;
      background: oklch(98% 0.008 75);
    }
    /* Tablet (500–1023px) — same phone frame as before, centered with
       rounded corners and a soft drop shadow so the surrounding dark
       background reads as "frame, not browser". */
    @media (min-width: 500px) and (max-width: 1023px) {
      body { align-items: center; padding: 20px 0; }
      #root {
        height: min(860px, calc(100dvh - 40px));
        border-radius: 44px;
        box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
        overflow: hidden;
      }
    }
    /* Desktop (1024px+) — drop the iframe-looking phone frame.
       App fills viewport height + stretches to a working width so
       the Diary / Rates calendar / Reports use the extra horizontal
       space (more day columns visible without scrolling). Reads
       like a focused web app instead of a phone mockup floating in
       a dark void. The genuinely phone-shaped screens (forms,
       booking detail) center their own content via .atithi-narrow
       so they don't sprawl. */
    @media (min-width: 1024px) {
      body {
        align-items: stretch;
        padding: 0;
        background: oklch(98% 0.008 75);
      }
      #root {
        /* Narrow by default — most screens (dashboard, forms,
           booking detail, settings) are phone-shaped and look best
           in a centered reading column. The Diary + Rates calendar
           want the full width; they widen the column by adding the
           `atithi-wide` class to <body> (toggled in App.jsx by route).*/
        max-width: 820px;
        width: 100%;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
        margin: 0 auto;
        /* Hairline borders frame the app column against the page
           background so it reads as an intentional app, not full-bleed. */
        border-left: 1px solid oklch(90% 0.012 70);
        border-right: 1px solid oklch(90% 0.012 70);
      }
      /* Wide screens (Diary / Rates) — use the laptop's horizontal
         space so more day columns are visible without scrolling. */
      body.atithi-wide #root { max-width: 1100px; }
    }
    @media (min-width: 1440px) {
      body.atithi-wide #root { max-width: 1320px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Register the service worker on production builds. We skip
    // registration on localhost / Vite-dev so HMR isn't tripped up
    // by a stale cached shell. The URL is relative to this file so
    // it works whether the app is served at '/' (Vercel) or '/atithi/'
    // (GitHub Pages).
    if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {
          // Swallow registration errors — the app still works
          // without the service worker, you just lose offline
          // caching + the standalone install prompt's instant feel.
        });
      });
    }
  </script>
</body>
</html>
