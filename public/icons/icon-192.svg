<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C8553D"/>
      <stop offset="1" stop-color="#8E2D1A"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed fill keeps the PWA maskable safe-zone intact. The brand mark is
       the Devanagari अ (Atithi = guest), matching the in-app Logo + Sign In —
       was previously a Latin "A", which didn't match the logo. -->
  <rect width="192" height="192" fill="url(#bg)"/>
  <text x="96" y="100" font-family="'Noto Sans Devanagari','Nirmala UI','Mangal','Kohinoor Devanagari',sans-serif"
        font-size="116" font-weight="700" fill="#ffffff"
        text-anchor="middle" dominant-baseline="central">अ</text>
</svg>
