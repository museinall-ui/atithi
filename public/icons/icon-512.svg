<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C8553D"/>
      <stop offset="1" stop-color="#8E2D1A"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed fill keeps the PWA maskable safe-zone intact. The brand mark is
       the Devanagari अ (Atithi = guest), matching the in-app Logo + Sign In. -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <text x="256" y="267" font-family="'Noto Sans Devanagari','Nirmala UI','Mangal','Kohinoor Devanagari',sans-serif"
        font-size="310" font-weight="700" fill="#ffffff"
        text-anchor="middle" dominant-baseline="central">अ</text>
</svg>
